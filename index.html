<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1b24">
<title>2026-TUS Ek Dönem · Kontenjanlar</title>
<style>
  :root{
    --ink:#0f1b24; --ink-2:#16303d;
    --surface:#ffffff; --paper:#eef2f4; --line:#dbe2e6;
    --text:#1d2a32; --muted:#6a7e89; --faint:#92a4ac;
    --accent:#0a7d8c; --accent-ink:#075f6b; --accent-wash:#e3f1f2;
    --badge-g:#0a7d8c; --badge-y:#7a5cc0;
    --shadow:0 6px 24px rgba(15,27,36,.16);
    --safe-t:env(safe-area-inset-top); --safe-b:env(safe-area-inset-bottom);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:rgba(10,125,140,.12);}
  html{-webkit-text-size-adjust:100%;}
  body{
    margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    color:var(--text);background:var(--paper);
    -webkit-font-smoothing:antialiased;
    padding-bottom:calc(70px + var(--safe-b));
  }
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-variant-numeric:tabular-nums;}

  /* sticky top: title, stats, search */
  header{
    position:sticky;top:0;z-index:20;
    background:linear-gradient(180deg,var(--ink),var(--ink-2));
    color:#eaf1f3;padding:calc(10px + var(--safe-t)) 14px 10px;
    box-shadow:0 2px 10px rgba(0,0,0,.2);
  }
  .htop{display:flex;align-items:baseline;gap:8px;}
  .htop h1{font-size:15px;font-weight:600;margin:0;letter-spacing:.2px;}
  .htop .src{font-size:11px;color:#93abb3;margin-left:auto;}
  .stats{display:flex;gap:16px;margin:8px 0 10px;}
  .stat{display:flex;flex-direction:column;line-height:1.1;}
  .stat .num{font-size:17px;font-weight:700;color:#fff;}
  .stat .num.accent{color:#63d2dd;}
  .stat .lab{font-size:9.5px;text-transform:uppercase;letter-spacing:.6px;color:#88a2aa;margin-top:2px;}
  .searchrow{display:flex;gap:8px;}
  .searchrow input{
    flex:1;font-size:16px;border:none;border-radius:10px;padding:11px 12px;
    background:#0b2530;color:#fff;
  }
  .searchrow input::placeholder{color:#7f9aa3;}
  .searchrow input:focus{outline:2px solid var(--accent);}
  .fbtn{
    border:none;border-radius:10px;padding:0 14px;font-size:14px;font-weight:600;
    background:var(--accent);color:#fff;display:flex;align-items:center;gap:6px;white-space:nowrap;
  }
  .fbtn .badge{background:#fff;color:var(--accent-ink);border-radius:999px;
    font-size:11px;font-weight:700;min-width:18px;height:18px;display:none;
    align-items:center;justify-content:center;padding:0 5px;}
  .fbtn.has .badge{display:inline-flex;}

  /* results */
  .list{padding:10px 12px 0;display:flex;flex-direction:column;gap:9px;}
  .card{
    background:var(--surface);border:1px solid var(--line);border-radius:14px;
    padding:12px 13px;box-shadow:0 1px 2px rgba(15,27,36,.04);
  }
  .card .r1{display:flex;align-items:flex-start;gap:8px;}
  .spec{font-size:14.5px;font-weight:700;line-height:1.25;flex:1;}
  .pt{font-size:11px;font-weight:700;color:var(--accent-ink);background:var(--accent-wash);
      border-radius:999px;padding:3px 8px;white-space:nowrap;margin-top:1px;}
  .inst{font-size:12.5px;color:var(--muted);margin-top:4px;line-height:1.35;}
  .meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-top:9px;}
  .city{font-size:11.5px;font-weight:600;color:var(--text);background:#eaf0f2;
        padding:3px 9px;border-radius:999px;}
  .tur{font-size:11px;color:var(--faint);}
  .q{display:inline-flex;align-items:baseline;gap:4px;font-size:11px;color:var(--muted);
     border:1px solid var(--line);border-radius:8px;padding:3px 8px;}
  .q b{font-size:13px;font-weight:700;}
  .q.g b{color:var(--badge-g);} .q.y b{color:var(--badge-y);}
  .code{margin-left:auto;font-size:11px;color:var(--faint);}
  .more{margin-top:10px;padding-top:10px;border-top:1px dashed var(--line);
        font-size:12px;color:var(--muted);line-height:1.5;display:none;}
  .card.open .more{display:block;}
  .more b{color:var(--text);font-weight:600;}
  .more .lbl{color:var(--faint);font-size:10px;text-transform:uppercase;letter-spacing:.5px;}
  .chev{color:var(--faint);font-size:11px;margin-top:2px;transition:transform .15s;}
  .card.open .chev{transform:rotate(180deg);}

  .empty{padding:50px 24px;text-align:center;color:var(--muted);}
  .empty strong{display:block;font-size:16px;color:var(--text);margin-bottom:6px;}
  .capnote{text-align:center;font-size:12px;color:var(--muted);padding:14px 16px 4px;}

  /* filter sheet */
  .scrim{position:fixed;inset:0;background:rgba(15,27,36,.45);z-index:40;opacity:0;
    pointer-events:none;transition:opacity .2s;}
  .scrim.show{opacity:1;pointer-events:auto;}
  .sheet{
    position:fixed;left:0;right:0;bottom:0;z-index:50;
    background:var(--surface);border-radius:18px 18px 0 0;
    transform:translateY(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);
    max-height:88vh;display:flex;flex-direction:column;
    padding-bottom:var(--safe-b);box-shadow:var(--shadow);
  }
  .sheet.show{transform:translateY(0);}
  .grab{width:38px;height:4px;border-radius:3px;background:#cdd7dc;margin:9px auto 4px;}
  .sheet h2{font-size:15px;margin:2px 16px 4px;font-weight:700;}
  .sheet .body{overflow:auto;padding:6px 16px 12px;-webkit-overflow-scrolling:touch;}
  .field{margin-top:13px;}
  .field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.5px;
    color:var(--muted);font-weight:600;margin-bottom:6px;}
  .field select,.field input{
    width:100%;font-size:16px;border:1px solid var(--line);border-radius:11px;
    padding:11px 12px;background:#fff;color:var(--text);appearance:none;
    -webkit-appearance:none;
  }
  .field.sel select{
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' fill='none' stroke='%236a7e89' stroke-width='2'/></svg>");
    background-repeat:no-repeat;background-position:right 13px center;padding-right:34px;
  }
  .field input:focus,.field select:focus{outline:none;border-color:var(--accent);
    box-shadow:0 0 0 3px var(--accent-wash);}
  .sheet .foot{display:flex;gap:10px;padding:12px 16px calc(12px + var(--safe-b));
    border-top:1px solid var(--line);background:#fff;}
  .sheet .foot button{flex:1;font-size:15px;font-weight:700;border-radius:12px;padding:13px;border:none;}
  .b-clear{background:#eef2f4;color:var(--text);}
  .b-apply{background:var(--accent);color:#fff;}

  /* bottom export bar */
  .exportbar{
    position:fixed;left:0;right:0;bottom:0;z-index:30;
    background:rgba(255,255,255,.92);backdrop-filter:saturate(1.4) blur(8px);
    border-top:1px solid var(--line);
    padding:9px 14px calc(9px + var(--safe-b));display:flex;gap:10px;align-items:center;
  }
  .exportbar .shown{font-size:12px;color:var(--muted);}
  .exportbar .shown b{color:var(--text);}
  .exportbar button{margin-left:auto;border:none;background:var(--accent);color:#fff;
    font-size:13.5px;font-weight:700;border-radius:10px;padding:10px 16px;}
</style>
</head>
<body>
<header>
  <div class="htop"><h1>2026-TUS Ek Dönem</h1><span class="src">Kontenjanlar</span></div>
  <div class="stats">
    <div class="stat"><span class="num" id="s-count">0</span><span class="lab">Program</span></div>
    <div class="stat"><span class="num accent" id="s-genel">0</span><span class="lab">Genel kont.</span></div>
    <div class="stat"><span class="num" id="s-yab">0</span><span class="lab">Yab. uyruklu</span></div>
  </div>
  <div class="searchrow">
    <input id="f-global" type="search" inputmode="search" placeholder="Ara: alan, kurum, il…" autocomplete="off">
    <button class="fbtn" id="open-filters">Filtre<span class="badge" id="fcount">0</span></button>
  </div>
</header>

<div class="capnote" id="capnote" style="display:none"></div>
<div class="list" id="list"></div>
<div class="empty" id="empty" style="display:none">

</div>

<div class="exportbar">

  <button id="btn-export">CSV indir</button>
</div>

<div class="scrim" id="scrim"></div>

    </div>
    <div class="field sel"><label>İl</label><select id="f-city"></select></div>
    <div class="field sel"><label>Uzmanlık alanı</label><select id="f-spec"></select></div>
    <div class="field sel"><label>Tür</label><select id="f-type"></select></div>
    <div class="field sel"><label>Sınıf</label><select id="f-cls"></select></div>
    <div class="field sel"><label>Puan türü</label><select id="f-pt"></select></div>
    <div class="field"><label>Kurum içerir</label><input id="f-inst" type="text" autocomplete="off"></div>
    <div class="field"><label>Üniversite içerir</label><input id="f-uni" type="text" autocomplete="off"></div>
    <div class="field"><label>Min. genel kontenjan</label><input id="f-min" type="number" inputmode="numeric" min="0" value="0"></div>
  </div>
  <div class="foot">
    <button class="b-clear" id="btn-clear">Temizle</button>
    <button class="b-apply" id="btn-apply">Sonuçları gör</button>
  </div>
</div>

const H = DATA.header, ROWS = DATA.rows;
const DROPDOWNS = {3:'f-city',7:'f-spec',2:'f-type',1:'f-cls',8:'f-pt'};
const CAP = 250; // ilk gösterim sınırı (performans)
const $ = id => document.getElementById(id);
const esc = s => (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const toInt = s => { s=(s||'').trim(); return /^\d+$/.test(s)?parseInt(s,10):0; };

let view = ROWS.slice();

// populate dropdowns
for(const [colStr,id] of Object.entries(DROPDOWNS)){
  const col=+colStr, sel=$(id);
  const vals=[...new Set(ROWS.map(r=>r[col]).filter(v=>v&&v.trim()))].sort((a,b)=>a.localeCompare(b,'tr'));
  sel.innerHTML='<option value="">(Tümü)</option>'+vals.map(v=>`<option>${esc(v)}</option>`).join('');
}

function activeFilterCount(){
  let n=0;
  if($('f-inst').value.trim())n++;
  if($('f-uni').value.trim())n++;
  if(toInt($('f-min').value)>0)n++;
  for(const id of Object.values(DROPDOWNS)) if($(id).value)n++;
  return n;
}

function applyFilters(){
  const g=$('f-global').value.trim().toLowerCase();
  const inst=$('f-inst').value.trim().toLowerCase();
  const uni=$('f-uni').value.trim().toLowerCase();
  const minG=toInt($('f-min').value);
  const dd={};
  for(const [c,id] of Object.entries(DROPDOWNS)){const v=$(id).value;if(v)dd[+c]=v;}

  view=ROWS.filter(r=>{
    for(const c in dd){ if(r[c]!==dd[c]) return false; }
    if(inst && !r[4].toLowerCase().includes(inst)) return false;
    if(uni  && !r[5].toLowerCase().includes(uni))  return false;
    if(minG>0 && toInt(r[9])<minG) return false;
    if(g && !r.join(' ').toLowerCase().includes(g)) return false;
    return true;
  });
  sortView();
  render();

  const fc=activeFilterCount();
  $('fcount').textContent=fc;
  $('open-filters').classList.toggle('has',fc>0);
}

function sortView(){
  const s=$('f-sort').value;
  if(s==='spec')view.sort((a,b)=>a[7].localeCompare(b[7],'tr'));
  else if(s==='city')view.sort((a,b)=>a[3].localeCompare(b[3],'tr')||a[7].localeCompare(b[7],'tr'));
  else if(s==='genel-desc')view.sort((a,b)=>toInt(b[9])-toInt(a[9]));
  else if(s==='genel-asc')view.sort((a,b)=>toInt(a[9])-toInt(b[9]));
  else view.sort((a,b)=>a[0].localeCompare(b[0]));
}

const list=$('list'), empty=$('empty'), capnote=$('capnote');
function render(){
  let genel=0,yab=0;
  for(const r of view){ genel+=toInt(r[9]); yab+=toInt(r[10]); }
  $('s-count').textContent=view.length.toLocaleString('tr');
  $('s-genel').textContent=genel.toLocaleString('tr');
  $('s-yab').textContent=yab.toLocaleString('tr');
  $('shown').innerHTML=`<b>${view.length}</b> / ${ROWS.length} program`;

  empty.style.display=view.length?'none':'block';
  const shownRows=view.slice(0,CAP);
  capnote.style.display = view.length>CAP ? 'block':'none';
  if(view.length>CAP) capnote.textContent=`${view.length} sonuçtan ilk ${CAP} tanesi gösteriliyor — daraltmak için filtre kullanın.`;

  const frag=document.createDocumentFragment();
  for(const r of shownRows){
    const card=document.createElement('div');
    card.className='card';
    const note = r[11]? `<div><span class="lbl">Özel koşul:</span> <b>${esc(r[11])}</b></div>`:'';
    const fak  = r[6]? `<div><span class="lbl">Fakülte:</span> ${esc(r[6])}</div>`:'';
    const uni  = r[5]? `<div><span class="lbl">Üniversite:</span> ${esc(r[5])}</div>`:'';
    card.innerHTML=
      `<div class="r1"><div class="spec">${esc(r[7])}</div>`+
      `<div class="pt">${esc(r[8])}</div><div class="chev">▼</div></div>`+
      `<div class="inst">${esc(r[4])}</div>`+
      `<div class="meta">`+
        `<span class="city">${esc(r[3])}</span>`+
        `<span class="tur">${esc(r[2])} · ${esc(r[1])}</span>`+
        `<span class="q g">Genel <b>${toInt(r[9])||'—'}</b></span>`+
        (toInt(r[10])?`<span class="q y">Yab. <b>${toInt(r[10])}</b></span>`:'')+
        `<span class="code mono">#${esc(r[0])}</span>`+
      `</div>`+
      `<div class="more">${uni}${fak}${note||(!uni&&!fak?'<span class="lbl">Ek bilgi yok</span>':'')}</div>`;
    card.addEventListener('click',()=>card.classList.toggle('open'));
    frag.appendChild(card);
  }
  list.replaceChildren(frag);
  window.scrollTo({top:0});
}

// CSV export (iOS: tries native share, falls back to download)
function exportCSV(){
  const rows=[H,...view];
  const csv=rows.map(r=>r.map(c=>{const s=String(c??'');return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;}).join(',')).join('\r\n');
  const text='\ufeff'+csv;
  const blob=new Blob([text],{type:'text/csv;charset=utf-8'});
  const file=new File([blob],'filtrelenmis_kontenjanlar.csv',{type:'text/csv'});
  if(navigator.canShare && navigator.canShare({files:[file]})){
    navigator.share({files:[file],title:'TUS kontenjanlar'}).catch(()=>{});
    return;
  }
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='filtrelenmis_kontenjanlar.csv';
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1500);
}

// sheet open/close
function openSheet(){$('scrim').classList.add('show');$('sheet').classList.add('show');}
function closeSheet(){$('scrim').classList.remove('show');$('sheet').classList.remove('show');}
$('open-filters').addEventListener('click',openSheet);
$('scrim').addEventListener('click',closeSheet);
$('btn-apply').addEventListener('click',()=>{applyFilters();closeSheet();});
$('btn-clear').addEventListener('click',()=>{
  $('sheet').querySelectorAll('input').forEach(el=>el.value=el.type==='number'?'0':'');
  $('sheet').querySelectorAll('select').forEach(el=>el.value='');
  applyFilters();
});
// live-update inside sheet too
$('sheet').querySelectorAll('select,input').forEach(el=>el.addEventListener('change',applyFilters));
$('f-global').addEventListener('input',applyFilters);
$('btn-export').addEventListener('click',exportCSV);

applyFilters();
</script>
